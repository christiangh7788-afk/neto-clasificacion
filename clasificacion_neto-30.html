<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clasificacion de Tiendas — Neto Veracruz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:#060f22}
:root{
  --aa:#f59e0b;--a:#22c55e;--b:#6b9fff;--c:#e85d04;--d:#ef4444;
  --bg:#0a1628;--bg2:#0d1e3a;--border:rgba(26,58,143,0.35);
  --text:rgba(255,255,255,0.90);--muted:rgba(255,255,255,0.40);
  --neto-blue:#1a3a8f;--neto-orange:#e85d04;
}
body{font-family:'Syne',sans-serif;background:linear-gradient(135deg,#060f22 0%,#0a1628 60%,#0d1e3a 100%);color:var(--text);display:flex;min-height:100vh;height:100%;margin:0;padding:0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}
#sidebar{width:220px;background:rgba(10,28,70,0.98);border-right:1px solid rgba(26,58,143,0.4);
  display:flex;flex-direction:column;padding:20px 0;position:fixed;top:0;left:0;bottom:0;height:100%;z-index:10;overflow-y:auto}
.brand{padding:0 16px 18px;border-bottom:1px solid var(--border);text-align:center}
.brand img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.12);margin-bottom:8px}
.brand-sub{font-size:9px;color:var(--muted);letter-spacing:2px;font-weight:700}
.brand-title{font-size:13px;font-weight:800;margin-top:2px}
.brand-region{font-size:10px;color:var(--muted);margin-top:1px}
nav{flex:1;padding:14px 10px}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;
  background:transparent;border:1px solid transparent;border-radius:10px;cursor:pointer;
  color:var(--muted);font-size:12px;font-weight:600;font-family:'Syne',sans-serif;
  margin-bottom:3px;transition:all 0.15s;text-align:left}
.nav-btn.active{background:rgba(26,58,143,0.3);border-color:rgba(26,58,143,0.6);color:#6b9fff;font-weight:700}
.nav-icon{font-size:14px}
.leyenda{padding:12px 16px;border-top:1px solid var(--border)}
.ley-title{font-size:9px;color:var(--muted);letter-spacing:1.5px;font-weight:700;margin-bottom:8px}
.ley-item{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px}
.ley-badge{width:28px;text-align:center;padding:2px 4px;border-radius:5px;font-weight:800;font-size:11px;font-family:'DM Mono',monospace}
#main{margin-left:220px;flex:1;padding:24px 28px;max-width:calc(100vw - 220px);min-height:100vh;background:linear-gradient(135deg,#060f22 0%,#0a1628 60%,#0d1e3a 100%)}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:3px}
.page-sub{font-size:11px;color:var(--muted)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:5px 13px;border-radius:20px;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:700;
  cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.15s}
.filter-btn.active{background:#e85d04;border-color:#e85d04;color:#fff}
.view{display:none}.view.active{display:block}
.kpi-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.kpi{background:rgba(10,28,70,0.5);border:1px solid rgba(26,58,143,0.35);border-radius:14px;
  padding:16px 18px;flex:1;min-width:120px;position:relative;overflow:hidden;cursor:pointer;transition:all 0.15s}
.kpi:hover{background:rgba(26,58,143,0.2)}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.kpi-icon{font-size:18px;margin-bottom:5px}
.kpi-val{font-size:26px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-1px}
.kpi-label{font-size:10px;color:var(--muted);margin-top:2px;font-weight:600}
.tabla{background:rgba(10,28,70,0.4);border:1px solid rgba(26,58,143,0.3);border-radius:14px;overflow:hidden}
.tabla-header{display:grid;padding:10px 18px;border-bottom:1px solid var(--border);
  font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px}
.tabla-row{display:grid;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.03);
  align-items:center;transition:background 0.1s;cursor:pointer}
.tabla-row:hover{background:rgba(255,255,255,0.02)}
.t-nombre{font-size:12px;font-weight:700}
.t-zona{font-size:10px;color:var(--muted);margin-top:1px}
.t-badge{display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:24px;border-radius:6px;font-weight:800;font-size:12px;font-family:'DM Mono',monospace}
.b-aaa{background:rgba(255,140,0,0.2);color:#ff8c00;border:1px solid rgba(255,140,0,0.3)}
.b-aa{background:rgba(245,158,11,0.2);color:var(--aa);border:1px solid rgba(245,158,11,0.3)}
.b-a{background:rgba(34,197,94,0.2);color:var(--a);border:1px solid rgba(34,197,94,0.3)}
.b-b{background:rgba(26,58,143,0.25);color:#6b9fff;border:1px solid rgba(26,58,143,0.5)}
.b-c{background:rgba(232,93,4,0.2);color:#e85d04;border:1px solid rgba(232,93,4,0.4)}
.b-d{background:rgba(239,68,68,0.2);color:var(--d);border:1px solid rgba(239,68,68,0.3)}
.b-na{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border)}
.rank-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.rank-col{background:rgba(10,28,70,0.4);border:1px solid rgba(26,58,143,0.3);border-radius:14px;overflow:hidden}
.rank-col-header{padding:12px 14px;font-size:11px;font-weight:800;letter-spacing:1px;text-align:center;border-bottom:1px solid var(--border)}
.rank-col-item{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:11px}
.rank-item-nombre{font-weight:600;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-item-zona{font-size:9px;color:var(--muted)}
.rank-empty{padding:16px;text-align:center;font-size:11px;color:var(--muted)}
.ind-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.ind-grid>div:first-child{grid-column:1/-1}
.ind-card{background:rgba(10,28,70,0.4);border:1px solid rgba(26,58,143,0.3);border-radius:14px;padding:16px}
.ind-title{font-size:11px;font-weight:800;letter-spacing:1px;margin-bottom:12px;color:var(--muted)}
.ind-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ind-bar-label{font-size:10px;font-weight:700;width:36px;font-family:'DM Mono',monospace}
.ind-bar-wrap{flex:1;background:rgba(255,255,255,0.05);border-radius:4px;height:8px;overflow:hidden}
.ind-bar-fill{height:100%;border-radius:4px;transition:width 0.5s}
.ind-bar-count{font-size:10px;color:var(--muted);width:60px;text-align:right;font-family:'DM Mono',monospace}
.detalle-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:center;justify-content:center}
.detalle-overlay.open{display:flex}
.detalle-card{background:#0a1628;border:1px solid rgba(26,58,143,0.4);border-radius:18px;
  padding:24px;width:90%;max-width:480px;max-height:85vh;overflow-y:auto}
.det-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.det-nombre{font-size:16px;font-weight:800}
.det-zona{font-size:11px;color:var(--muted)}
.det-close{background:rgba(255,255,255,0.08);border:none;color:var(--text);width:28px;height:28px;
  border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.det-indicadores{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.det-ind{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px}
.det-ind-label{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:6px}
.det-ind-badge{font-size:20px;font-weight:800;font-family:'DM Mono',monospace}
#mes-selector{padding:6px 12px;border-radius:8px;background:rgba(26,58,143,0.3);
  border:1px solid rgba(26,58,143,0.5);color:#e8eaf0;font-size:12px;font-weight:700;
  font-family:'Syne',sans-serif;outline:none;cursor:pointer}
#mes-selector option{background:#0a1628;color:#e8eaf0}
#subzona-selector{padding:5px 12px;border-radius:8px;background:rgba(232,93,4,0.15);
  border:1px solid rgba(232,93,4,0.4);color:#e8eaf0;font-size:11px;font-weight:700;
  font-family:'Syne',sans-serif;outline:none;cursor:pointer;margin-left:8px}
#subzona-selector option{background:#0a1628;color:#e8eaf0}


#back-btn:hover{background:#c2410c;transform:translateY(-2px)}


/* ── MOBILE HAMBURGER ─────────────────────────────────────────────────────── */
#hamburger{display:none;position:fixed;top:12px;left:12px;z-index:10000;
  background:#1a3a8f;border:none;border-radius:10px;padding:8px 10px;cursor:pointer;
  flex-direction:column;gap:4px;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
#hamburger span{display:block;width:20px;height:2px;background:#fff;border-radius:2px;transition:all 0.3s}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9998}
@media(max-width:768px){
  #hamburger{display:flex}
  #sidebar{transform:translateX(-100%);transition:transform 0.3s;z-index:9999}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.open{display:block}
  #main{margin-left:0 !important;max-width:100vw !important;padding:16px 12px}
  .page-header{padding-top:48px}
  
}


/* ── MOBILE TOP HEADER ───────────────────────────────────────────────────── */
#mobile-header{
  display:none;position:fixed;top:0;left:0;right:0;z-index:9997;
  background:rgba(10,22,40,0.97);border-bottom:1px solid rgba(26,58,143,0.4);
  padding:8px 16px 8px 52px;
  align-items:center;gap:10px;backdrop-filter:blur(10px)}
#mobile-header img{width:32px;height:32px;border-radius:50%;object-fit:cover;
  border:1.5px solid rgba(232,93,4,0.5)}
#mobile-header .mh-title{font-size:13px;font-weight:800;color:#fff;font-family:'Syne',sans-serif}
#mobile-header .mh-sub{font-size:9px;color:rgba(255,255,255,0.35);font-weight:600;letter-spacing:1px}
@media(max-width:768px){
  #mobile-header{display:flex}
  #main{padding-top:58px !important}
  .page-header{padding-top:0 !important}
}


#portal-btn{display:none}
@media(max-width:768px){
  #portal-btn{display:block;position:fixed;top:10px;right:10px;z-index:10001;
    background:#e85d04;color:#fff;font-size:11px;font-weight:800;
    font-family:'Syne',sans-serif;padding:7px 14px;border-radius:20px;
    text-decoration:none;box-shadow:0 2px 12px rgba(232,93,4,0.4);
    border:none;cursor:pointer;letter-spacing:0.5px}
}


/* ── ZONA ACORDEON CLASIFICACION ─────────────────────────────────── */
.zcl-acordeon{margin-bottom:6px;border-radius:10px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.06)}
.zcl-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;cursor:pointer;background:rgba(26,58,143,0.12);
  transition:background 0.2s;user-select:none}
.zcl-hdr:hover{background:rgba(26,58,143,0.25)}
.zcl-hdr-left .zcl-nombre{font-size:12px;font-weight:800;color:rgba(255,255,255,0.9)}
.zcl-hdr-left .zcl-count{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px}
.zcl-resumen{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.zcl-badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;font-family:'DM Mono',monospace}
.zcl-hdr-right{display:flex;align-items:center;gap:6px}
.zcl-arrow{font-size:10px;color:rgba(255,255,255,0.3);transition:transform 0.25s;display:inline-block}
.zcl-body{display:none;background:rgba(0,0,0,0.12)}
.zcl-body.open{display:block}
.zcl-arrow.open{transform:rotate(180deg)}
.zcl-tienda-row{display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;border-top:1px solid rgba(255,255,255,0.04);cursor:pointer;
  transition:background 0.1s}
.zcl-tienda-row:hover{background:rgba(255,255,255,0.03)}
.zcl-t-nombre{font-size:11px;font-weight:700;color:rgba(255,255,255,0.85)}

</style>
</head>

      '<div class="rank-col-header" style="color:'+colors[c]+';border-top:3px solid '+colors[c]+'">'+c+' - '+tiendas.length+'</div>' +
      (tiendas.length ? tiendas.map(function(s) {
        return '<div class="rank-col-item"><div class="rank-item-nombre">'+s.nombre.replace('Neto ','')+'</div><div class="rank-item-zona">'+s.zona+'</div></div>';
      }).join('') : '<div class="rank-empty">Sin tiendas</div>') + '</div>';
  }).join('');
}
function renderIndicadores() {
  var sucs = sucFiltradas();
  var clasif = getClasif();
  var colors = {AAA:'#ff8c00',AA:'#f59e0b',A:'#22c55e',B:'#6b9fff',C:'#e85d04',D:'#ef4444'};
  var total = sucs.length;
  var counts = {};
  CLASES.forEach(function(c) { counts[c]=0; });
  sucs.forEach(function(s) { var cl=claseGlobal(clasif[s.id]); if(cl) counts[cl]=(counts[cl]||0)+1; });
  var resumen = '<div class="ind-card" style="grid-column:1/-1"><div class="ind-title">RESUMEN CLASIFICACION - '+(MESES_LABELS[mesActivo]||mesActivo).toUpperCase()+'</div>' +
    '<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">' +
    CLASES.map(function(c) {
      return '<div style="flex:1;min-width:70px;background:'+colors[c]+'18;border:1px solid '+colors[c]+'30;border-radius:10px;padding:12px;text-align:center">' +
        '<div style="font-size:22px;font-weight:800;font-family:DM Mono,monospace;color:'+colors[c]+'">'+(counts[c]||0)+'</div>' +
        '<div style="font-size:10px;font-weight:700;color:'+colors[c]+';margin-top:2px">'+c+'</div>' +
        '<div style="font-size:9px;color:rgba(255,255,255,0.35);margin-top:1px">'+(total?Math.round((counts[c]||0)/total*100):0)+'%</div></div>';
    }).join('')+'</div>'+
    CLASES.map(function(c) {
      return '<div class="ind-bar-row"><div class="ind-bar-label" style="color:'+colors[c]+'">'+c+'</div>' +
        '<div class="ind-bar-wrap"><div class="ind-bar-fill" style="width:'+(total?(counts[c]||0)/total*100:0)+'%;background:'+colors[c]+'"></div></div>' +
        '<div class="ind-bar-count">'+(counts[c]||0)+' tiendas</div></div>';
    }).join('')+'</div>';
  var zonas = ['Veracruz Norte','Veracruz Centro','Veracruz Sur'];
  var zonaCards = zonas.map(function(zona) {
    var sz = sucs.filter(function(s) { return s.zona===zona; });
    var cz = {};
    CLASES.forEach(function(c) { cz[c]=0; });
    sz.forEach(function(s) { var cl=claseGlobal(clasif[s.id]); if(cl) cz[cl]=(cz[cl]||0)+1; });
    return '<div class="ind-card"><div class="ind-title">'+zona.toUpperCase()+' - '+sz.length+' tiendas</div>'+
      CLASES.map(function(c) {
        return '<div class="ind-bar-row"><div class="ind-bar-label" style="color:'+colors[c]+'">'+c+'</div>' +
          '<div class="ind-bar-wrap"><div class="ind-bar-fill" style="width:'+(sz.length?(cz[c]||0)/sz.length*100:0)+'%;background:'+colors[c]+'"></div></div>' +
          '<div class="ind-bar-count">'+(cz[c]||0)+'</div></div>';
      }).join('')+'</div>';
  }).join('');
  document.getElementById('ind-grid').innerHTML = resumen + zonaCards;
}
function abrirDetalle(id) {
  var s = SUCURSALES.find(function(x) { return x.id===id; });
  var clasif = getClasif();
  var cl = clasif[id];
  var claseColors = {AAA:'#ff8c00',AA:'#f59e0b',A:'#22c55e',B:'#6b9fff',C:'#e85d04',D:'#ef4444'};
  document.getElementById('det-nombre').textContent = s.nombre;
  document.getElementById('det-zona').textContent = s.zona + ' - ' + (MESES_LABELS[mesActivo]||mesActivo);
  var g = claseGlobal(cl);
  var rotVal = (cl && cl.rotacion !== null && cl.rotacion !== undefined) ? cl.rotacion : null;
  var mermaVal = (cl && cl.merma !== null && cl.merma !== undefined) ? cl.merma : null;
  var frogmiVal = (cl && cl.frogmi !== null && cl.frogmi !== undefined) ? cl.frogmi : null;
  var ventaVal = (cl && cl.venta !== null && cl.venta !== undefined) ? cl.venta : null;
  var cRot = rotVal !== null ? (rotVal > 0 ? '#ef4444' : '#22c55e') : 'rgba(255,255,255,0.2)';
  var cMerma = mermaVal !== null ? (mermaVal >= -0.65 ? '#22c55e' : mermaVal >= -0.80 ? '#f59e0b' : '#ef4444') : 'rgba(255,255,255,0.2)';
  var cFrogmi = frogmiVal !== null ? (frogmiVal >= 90 ? '#22c55e' : frogmiVal >= 80 ? '#f59e0b' : '#ef4444') : 'rgba(255,255,255,0.2)';
  var cVenta = ventaVal !== null ? (ventaVal >= 100 ? '#22c55e' : ventaVal >= 90 ? '#f59e0b' : '#ef4444') : 'rgba(255,255,255,0.2)';
  var frogmiLabel = mesActivo === '2026-01' ? '% MISTERY' : '% FROGMI';
  document.getElementById('det-indicadores').innerHTML =
    '<div class="det-ind" style="grid-column:1/-1;background:rgba(26,58,143,0.2);border-color:rgba(26,58,143,0.4)">' +
    '<div class="det-ind-label">CLASIFICACION FINAL</div>' +
    '<div class="det-ind-badge" style="font-size:28px;color:'+(g?claseColors[g]:'rgba(255,255,255,0.2)')+'">'+( g||'--')+'</div></div>' +
    '<div class="det-ind"><div class="det-ind-label">% ROTACION</div>' +
    '<div class="det-ind-badge" style="color:'+cRot+'">'+(rotVal!==null?rotVal.toFixed(2)+'%':'--')+'</div>' +
    '<div style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:4px">Meta: 0.00%</div></div>' +
    '<div class="det-ind"><div class="det-ind-label">% MERMA</div>' +
    '<div class="det-ind-badge" style="color:'+cMerma+'">'+(mermaVal!==null?mermaVal.toFixed(2)+'%':'--')+'</div>' +
    '<div style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:4px">Meta: -0.65%</div></div>' +
    '<div class="det-ind"><div class="det-ind-label">'+frogmiLabel+'</div>' +
    '<div class="det-ind-badge" style="color:'+cFrogmi+'">'+(frogmiVal!==null?frogmiVal.toFixed(0)+'%':'--')+'</div>' +
    '<div style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:4px">Meta: 90%</div></div>' +
    '<div class="det-ind"><div class="det-ind-label">% VENTA</div>' +
    '<div class="det-ind-badge" style="color:'+cVenta+'">'+(ventaVal!==null?ventaVal.toFixed(0)+'%':'--')+'</div>' +
    '<div style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:4px">Meta: 100%</div></div>';
  document.getElementById('detalle-overlay').classList.add('open');
}
function cerrarDetalle(e) {
  if (!e || e.target===document.getElementById('detalle-overlay')) {
    document.getElementById('detalle-overlay').classList.remove('open');
  }
}
renderMesSelector();
actualizarSubzonas();
renderGeneral();

function toggleSidebar() {
  var s = document.getElementById('sidebar');
  var o = document.getElementById('sidebar-overlay');
  s.classList.toggle('open');
  o.classList.toggle('open');
}
document.querySelectorAll('.nav-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    if (window.innerWidth <= 768) toggleSidebar();
  });
});

</script>
</body>
